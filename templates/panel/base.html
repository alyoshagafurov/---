{% extends 'base.html' %}
{% block title %}Админка — {{ SITE_NAME }}{% endblock %}

{% block content %}
<h1 class="page-title">Админка</h1>
<div class="panel-layout">
  <aside class="card panel-nav">
    <a href="{% url 'panel:index' %}" class="{% if active == 'index' %}active{% endif %}">Обзор</a>
    <a href="{% url 'panel:users' %}" class="{% if active == 'users' %}active{% endif %}">Пользователи</a>
    <a href="{% url 'panel:ads_all' %}" class="{% if active == 'all' %}active{% endif %}">Все объявления</a>
    <a href="{% url 'panel:ads_queue' %}" class="{% if active == 'queue' %}active{% endif %}">В очереди</a>
    <a href="{% url 'panel:ads_deleted' %}" class="{% if active == 'deleted' %}active{% endif %}">Удалённые</a>
    <a href="{% url 'panel:complaints' %}" class="{% if active == 'complaints' %}active{% endif %}">Жалобы на объявления</a>
    <a href="{% url 'panel:categories' %}" class="{% if active == 'categories' %}active{% endif %}">Добавить категорию</a>
    <a href="{% url 'panel:rules_edit' %}" class="{% if active == 'rules' %}active{% endif %}">Правила</a>
  </aside>
  <section>
    {% block panel %}{% endblock %}
  </section>
</div>
{% endblock %}
